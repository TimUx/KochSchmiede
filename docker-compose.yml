services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kochschmiede
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: kochschmiede
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kochschmiede"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - kochschmiede

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://kochschmiede:${POSTGRES_PASSWORD:-secret}@postgres:5432/kochschmiede
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env file}
      CORS_ORIGINS: '["http://localhost:3000","http://frontend:3000","http://${DOMAIN:-localhost}","http://${DOMAIN:-localhost}:${PORT:-3000}"]'
      # AI parsing backends – free / local only (see .env.example for setup)
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-llama3.2}
      AI_ENDPOINT: ${AI_ENDPOINT:-}
      AI_MODEL: ${AI_MODEL:-llama3.2}
      # Seconds to wait per LLM call; increase on slow CPU-only hardware
      AI_TIMEOUT: ${AI_TIMEOUT:-300}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
    networks:
      - kochschmiede

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"
    networks:
      - kochschmiede

  # ── Optional: local Ollama LLM server ──────────────────────────────────────
  # Start with:  docker compose --profile ollama up
  # Then set in .env:
  #   LLM_BASE_URL=http://ollama:11434/v1
  #   LLM_MODEL=llama3.2-vision      # vision model (recommended)
  # Pull a model (first time):
  #   docker compose exec ollama ollama pull llama3.2-vision
  ollama:
    image: ollama/ollama:latest
    profiles: [ollama]
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - kochschmiede
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  uploads_data:
  ollama_data:

networks:
  kochschmiede:
    driver: bridge
